<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brainstorm Companion</title>
  <style>
    :root {
      --font-family: system-ui, -apple-system, sans-serif;
      --bg-color: #ffffff;
      --text-color: #111827;
      --muted-color: #6b7280;
      --border-color: #e5e7eb;
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-foreground: #ffffff;
      --card-bg: #f9fafb;
      --card-hover: #f3f4f6;
      --selected-bg: #eff6ff;
      --selected-border: #3b82f6;
      --success-color: #10b981;
      --danger-color: #ef4444;
      --header-bg: #f3f4f6;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #111827;
        --text-color: #f9fafb;
        --muted-color: #9ca3af;
        --border-color: #374151;
        --primary-color: #3b82f6;
        --primary-hover: #60a5fa;
        --card-bg: #1f2937;
        --card-hover: #374151;
        --selected-bg: #1e3a8a;
        --selected-border: #60a5fa;
        --header-bg: #1f2937;
      }
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: var(--header-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      color: inherit;
    }

    .brand-logo {
      height: 1.25rem;
      width: auto;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.875rem;
      color: var(--muted-color);
    }

    .status-dot {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background-color: var(--danger-color);
    }

    .status-dot.connected {
      background-color: var(--success-color);
    }

    main {
      flex: 1;
      padding: 2rem 1.5rem;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    h2 {
      margin-top: 0;
      font-size: 1.75rem;
      font-weight: 700;
    }

    .subtitle {
      font-size: 1.125rem;
      color: var(--muted-color);
      margin-top: -0.5rem;
      margin-bottom: 2rem;
    }

    /* Options UI */
    .options {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    @media (min-width: 640px) {
      .options {
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }
    }

    .option {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      padding: 1.25rem;
      cursor: pointer;
      display: flex;
      gap: 1rem;
      transition: all 0.2s;
    }

    .option:hover {
      background-color: var(--card-hover);
      border-color: var(--muted-color);
    }

    .option.selected {
      background-color: var(--selected-bg);
      border-color: var(--selected-border);
      box-shadow: 0 0 0 1px var(--selected-border);
    }

    .letter {
      width: 2rem;
      height: 2rem;
      background-color: var(--border-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
    }

    .option.selected .letter {
      background-color: var(--primary-color);
      color: var(--primary-foreground);
    }

    .option-content {
      flex: 1;
    }

    .option-content h3 {
      margin: 0 0 0.25rem 0;
      font-size: 1.125rem;
    }

    .option-content p {
      margin: 0;
      color: var(--muted-color);
      font-size: 0.95rem;
      line-height: 1.4;
    }

    /* Cards UI */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      background-color: var(--card-hover);
      border-color: var(--muted-color);
    }

    .card.selected {
      background-color: var(--selected-bg);
      border-color: var(--selected-border);
      box-shadow: 0 0 0 1px var(--selected-border);
    }

    .card-image {
      background-color: var(--border-color);
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-bottom: 1px solid var(--border-color);
    }

    .card-body {
      padding: 1.25rem;
      flex: 1;
    }

    .card-body h3 {
      margin: 0 0 0.5rem 0;
      font-size: 1.125rem;
    }

    .card-body p {
      margin: 0;
      color: var(--muted-color);
      font-size: 0.9rem;
      line-height: 1.4;
    }

    /* Mockup/Wireframe elements */
    .mockup {
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      overflow: hidden;
      background-color: var(--bg-color);
      margin-bottom: 1.5rem;
    }

    .mockup-header {
      background-color: var(--header-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      color: var(--muted-color);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .mockup-body {
      padding: 1.5rem;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    @media (min-width: 768px) {
      .split {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* Mock Elements */
    .mock-nav {
      background-color: var(--header-bg);
      border: 1px dashed var(--muted-color);
      padding: 0.5rem 1rem;
      font-family: monospace;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      border-radius: 0.25rem;
    }

    .mock-sidebar {
      width: 150px;
      background-color: var(--card-bg);
      border: 1px dashed var(--muted-color);
      padding: 1rem;
      font-size: 0.85rem;
      margin-right: 1rem;
      border-radius: 0.25rem;
      flex-shrink: 0;
    }

    .mock-content {
      flex: 1;
      border: 1px dashed var(--muted-color);
      padding: 1rem;
      border-radius: 0.25rem;
    }

    .mock-button {
      background-color: var(--primary-color);
      color: var(--primary-foreground);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.25rem;
      font-weight: 600;
      cursor: pointer;
    }

    .mock-input {
      border: 1px solid var(--border-color);
      padding: 0.5rem;
      border-radius: 0.25rem;
      background-color: var(--bg-color);
      color: var(--text-color);
    }

    .placeholder {
      border: 2px dashed var(--border-color);
      border-radius: 0.375rem;
      padding: 2rem;
      text-align: center;
      color: var(--muted-color);
    }

    .pros-cons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    @media (min-width: 640px) {
      .pros-cons {
        grid-template-columns: 1fr 1fr;
      }
    }

    .pros, .cons {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      padding: 1.25rem;
    }

    .pros h4, .cons h4 {
      margin-top: 0;
      margin-bottom: 0.75rem;
    }

    .pros h4 { color: var(--success-color); }
    .cons h4 { color: var(--danger-color); }

    .pros ul, .cons ul {
      margin: 0;
      padding-left: 1.25rem;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .section {
      margin-bottom: 2rem;
    }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--muted-color);
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      display: block;
    }
  </style>
</head>
<body>
  <header>
    <!-- BRANDING -->
    <div class="status-indicator">
      <div id="connection-dot" class="status-dot"></div>
      <span id="connection-text">Disconnected</span>
    </div>
  </header>
  <main>
    <!-- CONTENT -->
  </main>
</body>
</html>
